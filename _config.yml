  es-ct:
    label: ES-CT
    icon: "<img src='/img/catalonia-flag.png' width='20' height='20'/>"
    description: "Detecció precoç d'incendis forestals"
    buttons:
      moreInfo: "Més informació"
      contactUs: "Contacta amb nosaltres"
      submit: "Enviar"
    header:
      title: "Detecció d'incendis forestals"
      subtitle: "Pyronear és un projecte de codi obert per al bé comú"
    manifesto:
      title: "Qui sóm?"
      phrase1: "<b>Pyronear</b> és una ONG sense ànim de lucre que té com a objectiu democratitzar solucions obertes i de baixa tecnologia per a la lluita contra els incendis forestals, en benefici dels ecosistemes i dels ciutadans. Per aconseguir aquest objectiu, estem construint conjuntament una solució de detecció precoç que sigui de codi obert, eficient, automàtica, eficient energèticament, econòmica i modular."
      card1:
        icon_src: "/img/cards_icons/opensource.svg"
        title: "Open source"
        content: "Tot el nostre codi està disponible de forma gratuïta i desenvolupat conjuntament pels nostres voluntaris. Creiem que la intel·ligència col·lectiva és la millor manera de resoldre un problema complex."
      card2:
        icon_src: "/img/cards_icons/radar-2.svg"
        title: "Detecció precoç"
        content: "Per lluitar eficaçment contra els incendis forestals, és important detectar-los precoçment per tal de permetre una intervenció ràpida dels serveis de bombers i salvament i limitar així el seu impacte."
      card3:
        icon_src: "/img/cards_icons/rocket.svg"
        title: "Rendiment"
        content: "Els nostres experts en intel·ligència artificial segueixen activament les notícies en aquest camp en moviment ràpid per tal que Pyronear es beneficiï dels seus últims avenços."
      card4:
        icon_src: "/img/cards_icons/auto-awesome.svg"
        title: "Automàtic"
        content: "Oferim una solució totalment automatitzada per alliberar temps dels bombers."
      card5:
        icon_src: "/img/cards_icons/eco.svg"
        title: "Sobre energia"
        content: "Estem en un enfocament denominat de baixa tecnologia, hem construït un dispositiu de baix consum que permet un desplegament més fàcil i un ús més raonat dels nostres valuosos recursos."
      card6:
        icon_src: "/img/cards_icons/savings-solid.svg"
        title: "Economic"
        content: "La nostra R+D la fan voluntaris, el nostre dispositiu és sobri i objecte sense ànim de lucre de la nostra associació, la qual cosa ens permet proposar preus molt competitius per facilitar un desplegament al territori."
      card7:
        icon_src: "/img/cards_icons/grid-view-solid.svg"
        title: "Modular"
        content: "Oferim un sistema de detecció complet però el nostre dispositiu ha estat dissenyat per funcionar amb equips existents (ús de càmeres ja instal·lades, connexió amb programari existent...)"
      card8:
        icon_src: "/img/cards_icons/share.svg"
        title: "Open data" 
        content: "Amb l'ajuda dels nostres socis i voluntaris, estem construint un conjunt de dades que compartim com a Open Data, de manera que les imatges recollides i anotades puguin ser utilitzades per tantes persones com sigui possible."
    steps:
      title: "Com funciona ?"
      text1: "Pyronear és un <b>solució completa de gestió del risc d'incendi</b>. Consta d'un <b>algorisme de detecció precoç d'incendis forestals</b>, implementat en un microordinador, connectat a <b>càmeres col·locades en punts alts</b> amb vistes al bosc. Els nostres detectors es comuniquen <b>alertes d'incendi<b> a una base de dades connectada a <b>plataforma de supervisió</b> per al cos de bombers."
      image_src_1: "/img/solution - ENG.png"
      text2: "Les nostres torres de detecció estan formades per 4/5 càmeres d'alta resolució i un micro ordinador. Capturem una imatge per càmera a intervals regulars i després l'analitzem localment mitjançant el nostre model de detecció d'incendis forestals. En cas de detecció, s'activa el mode d'alerta, totes les imatges procedents de la càmera després d'haver detectat l'incendi s'envien a la nostra base de dades a través de la nostra API, el protocol de comunicació que hem desenvolupat."
      image_src_2: "/img/model.png"

    open-data:
      title: "Per què un conjunt de dades obertes?"
      text1: "El nostre algorisme de detecció és un <b>model d'intel·ligència artificial (IA)</b> entrenat en nombroses <b>imatges d'inici de foc</b>. És a dir, l'algorisme ha estat entrenat per reconèixer el fum i les flames. en moltes situacions i en diferents territoris."
      text2: "Amb aquesta finalitat, estem construint <b>amb l'ajuda dels nostres socis i voluntaris</b>, un <b>conjunt de dades</b> que compartim en <b>dades obertes</b>, en per tal que les imatges recollides i anotades puguin ser utilitzades per tantes persones com sigui possible. Així, posant en comú aquests recursos, augmentem les possibilitats de preservar un altre recurs, boscos i espais naturals"
      ds_title: "Dataset"
      ds_text: "Trobeu el conjunt de dades a HuggingFace"
      ds_image_src: "/img/huggingface-logo.svg"
      ds_url: "https://huggingface.co/datasets/pyronear/pyro-sdis"
      legal_notice_title: "Nota legal"
      legal_notice_text: "Ets bomber a França i t'agradaria compartir les teves imatges de detecció precoç? Aquesta nota legal us hauria d'interessar!"
      legal_notice_url: "https://pyronear.notion.site/Notes-de-synth-se-FAQ-du-webinaire-open-data-DINUM-SDIS-MSP-18c425b63668806cb5dbc7a35d7452b4"
      legal_notice_src: "/img/document.svg"

    callToAction:
      title: "Com desplegar-lo?"
      content: "Per obtenir més informació, poseu-vos en contacte amb nosaltres per correu electrònic o a les xarxes socials. Ens posarem en contacte amb vostè el més aviat possible."
