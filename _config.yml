  es:
    label: es
    icon: 🇪🇸
    description: "Detección temprana de incendios forestales"
    buttons:
      moreInfo: "Más información"
      contactUs: "Contacta con nosotros"
      submit: "Enviar"
    header:
      title: "Detección temprana de incendios forestales"
      subtitle: "Pyronear es un proyecto de código abierto para el bien común"
    manifesto:
      title: "Quienes somos nosotros?"
      phrase1: "<b>Pyronear</b> es una ONG sin fines de lucro cuyo objetivo es democratizar soluciones abiertas y de baja tecnología para combatir incendios forestales, en beneficio de los ecosistemas y los ciudadanos. Para lograr este objetivo, estamos co-construyendo una solución de detección temprana que es de código abierto, eficiente, automática, energéticamente eficiente, económica y modular."
      card1:
        icon_src: "/img/cards_icons/opensource.svg"
        title: "Código abierto"
        content: "Todo nuestro código está disponible de forma gratuita y desarrollado conjuntamente por nuestros voluntarios. Creemos que la inteligencia colectiva es la mejor manera de resolver un problema complejo."
      card2:
        icon_src: "/img/cards_icons/radar-2.svg"
        title: "Detección temprana"
        content: "Para luchar eficazmente contra los incendios forestales, es importante detectarlos a tiempo para permitir una rápida intervención de los servicios de bomberos y salvamento y así limitar su impacto."
      card3:
        icon_src: "/img/cards_icons/rocket.svg"
        title: "Actuación"
        content: "Nuestros expertos en IA siguen activamente las noticias en este campo de rápido movimiento para que Pyronear se beneficie de sus últimos avances."
      card4:
        icon_src: "/img/cards_icons/auto-awesome.svg"
        title: "Automátic"
        content: "Ofrecemos una solución totalmente automatizada para liberar el tiempo de los bomberos."
      card5:
        icon_src: "/img/cards_icons/eco.svg"
        title: "Energéticamente sobrio"
        content: "Estamos en un enfoque llamado de baja tecnología, hemos construido un dispositivo de bajo consumo que permite una implementación más fácil y un uso más razonado de nuestros valiosos recursos."
      card6:
        icon_src: "/img/cards_icons/savings-solid.svg"
        title: "Económico"
        content: "Nuestra I+D es realizada por voluntarios, nuestro dispositivo es sobrio y sin ánimo de lucro objeto de nuestra asociación, lo que nos permite proponer precios muy competitivos para facilitar un despliegue en el territorio."
      card7:
        icon_src: "/img/cards_icons/grid-view-solid.svg"
        title: "Modular"
        content: "Ofrecemos un sistema de detección completo pero nuestro dispositivo ha sido diseñado para trabajar con equipos existentes (uso de cámaras ya instaladas, conexión con software existente...)"
      card8:
        icon_src: "/img/cards_icons/share.svg"
        title: "Open data" 
        content: "Con la ayuda de nuestros asociados y voluntarios, estamos construyendo un banco de datos que compartimos como Open Data, para que las imágenes recogidas y anotadas puedan ser utilizadas por el mayor número posible de personas."
    steps:
      title: "Como funciona ?"
      text1: "Pironear es un <b>solución completa de gestión de riesgos de incendio</b>. consiste en un <b>early algoritmo de detección de incendios forestales</b>, implementado en una microcomputadora, conectada a <b>cámaras colocadas en puntos altos</b> con vista al bosque. Nuestros detectores se comunican <b>alertas de incendios<b> a una base de datos que está conectada a un <b>plataforma de supervisión</b> para el cuerpo de bomberos."
      image_src_1: "/img/solution - ENG.png"
      text2: "Nuestras torres de detección consisten en 4/5 cámaras de alta resolución y una microcomputadora. Capturamos una imagen por cámara a intervalos regulares y luego la analizamos localmente usando nuestro modelo de detección de incendios forestales. En caso de detección, se activa el modo de alerta, todas las imágenes provenientes de la cámara que detectó el incendio se envían a nuestra base de datos a través de nuestra api, el protocolo de comunicación que hemos desarrollado."
      image_src_2: "/img/model.png"

    open-data:
      title: "¿Por qué una base de datos abierta?"
      text1: "Nuestro algoritmo de detección es un <b>modelo de inteligencia artificial (IA)</b> entrenado en un gran número de <b>imágenes de incendios</b>. En otras palabras, el algoritmo ha sido entrenado para reconocer el humo y las llamas en numerosas situaciones y en diferentes territorios."
      text2: "Para ello, <b>con la ayuda de nuestros socios y voluntarios</b>, estamos construyendo <b>un conjunto de datos</b> que compartimos en <b>open data</b>, para que las imágenes recogidas y anotadas puedan ser utilizadas por el mayor número posible de personas. De este modo, al poner en común estos recursos, aumentamos las posibilidades de preservar otro recurso: los bosques y las zonas naturales."
      ds_title: "Dataset"
      ds_text: "Ver el conjunto de datos en HuggingFace"
      ds_image_src: "/img/huggingface-logo.svg"
      ds_url: "https://huggingface.co/datasets/pyronear/pyro-sdis"
      legal_notice_title: "Aviso legal"
      legal_notice_text: "¿Trabaja para una SDIS en Francia y desea compartir sus imágenes de detección precoz? Esta nota legal debería interesarle."
      legal_notice_url: "https://pyronear.notion.site/Notes-de-synth-se-FAQ-du-webinaire-open-data-DINUM-SDIS-MSP-18c425b63668806cb5dbc7a35d7452b4"
      legal_notice_src: "/img/document.svg"

    callToAction:
      title: "¿Cómo implementarlo?"
      content: "Para obtener más información, comuníquese con nosotros por correo electrónico o en las redes sociales. Nos pondremos en contacto con usted lo antes posible."
